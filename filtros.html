<div class="screen" id="screen-filtros">
  <div class="mobile-frame">
    <div class="modal-header">
      <button class="btn-back" onclick="goTo('screen-home')">✕</button>
      <span class="modal-title">Filtros Avançados</span>
      <button class="btn-clear">LIMPAR</button>
    </div>

    <div class="content-scroll">
      <div class="filter-group">
        <label class="filter-label">Estado</label>
        <div class="select-box">
          <span>Todos os estados</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Área</label>
        <div class="select-box">
          <span>Todas as áreas</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Nível de Escolaridade</label>
        <div class="chips-row">
          <span class="chip active">Superior</span>
          <span class="chip">Médio</span>
          <span class="chip">Fundamental</span>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Banca Organizadora</label>
        <div class="search-input">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Ex: FGV, CESPE, Vunesp..." />
        </div>
      </div>

      <div class="filter-section-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Viabilidade Urbana
      </div>

      <div class="filter-group">
        <label class="filter-label">Endereço de Partida</label>
        <div class="address-options">
          <div class="address-option selected">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Casa
          </div>
          <div class="address-option">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/></svg>
            Faculdade
          </div>
        </div>
        <div class="address-custom">
          <span>Av. Paulista, 1578 - Bela Vista, SP</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>

      <div class="filter-group">
        <div class="time-row">
          <label class="filter-label">Tempo máximo de deslocamento</label>
          <span class="time-value">45 min</span>
        </div>
        <input type="range" min="10" max="120" value="45" class="range-slider" />
        <p class="range-hint">Calculado com base no tráfego médio em horários de pico.</p>
      </div>

      <div class="filter-group">
        <label class="filter-label">Modais de transporte</label>
        <div class="transport-grid">
          <label class="transport-item"><input type="checkbox" checked /> 🚌 Ônibus</label>
          <label class="transport-item"><input type="checkbox" checked /> 🚇 Metrô</label>
          <label class="transport-item"><input type="checkbox" /> 🚗 Carro</label>
          <label class="transport-item"><input type="checkbox" /> 🚲 Bike</label>
        </div>
      </div>

      <div class="map-preview">
        <div class="map-placeholder">
          <p class="map-label">📍 Visualizando raio de alcance para São Paulo</p>
        </div>
      </div>
    </div>

    <div class="bottom-action">
      <button class="btn-primary" onclick="goTo('screen-home')">Aplicar Filtros</button>
    </div>
  </div>
</div>
